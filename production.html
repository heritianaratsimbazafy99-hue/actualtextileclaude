<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Production — Actual Textiles Madagascar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--cream:oklch(97% .009 80);--dark:oklch(16% .018 55);--forest:oklch(36% .105 155);--amber:oklch(59% .125 62);--stone:oklch(93% .007 75);--mid:oklch(50% .010 70);--border:oklch(88% .008 75)}
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);overflow-x:hidden;-webkit-font-smoothing:antialiased}
    img{max-width:100%;display:block} a{text-decoration:none;color:inherit} button{font-family:inherit}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="at-i18n.jsx"></script>
  <script type="text/babel" src="at-shared.jsx"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const sp = (m) => `${m?'64px':'110px'} 0`;
    const pad = (m) => `0 ${m?'20px':'48px'}`;

    function ProductsSection() {
      const lang = useLang(); const m = useMobile(); const isFr = lang==='fr';
      const products = [
        { title:isFr?"Vêtements enfants":'Children\'s Clothing',
          desc:isFr?"Notre spécialité historique — bodies, vêtements de sport et de ville dans une grande variété de matières et styles."
                  :"Our historic speciality — from babywear to sportswear across a wide variety of materials and styles.",
          img:'./assets/actual-textiles/createur_vetements.jpg' },
        { title:isFr?'Mode femme':'Women\'s Fashion',
          desc:isFr?"Blouses, hauts, chemisiers — avec une attention particulière aux finitions et à la tombe premium."
                  :"Blouses, shirts, tops — with particular attention to finishes, drape, and premium-quality details.",
          img:'./assets/actual-textiles/confection_vetements.jpg' },
        { title:isFr?'Loungewear & Sleepwear':'Loungewear & Sleepwear',
          desc:isFr?"Pyjamas, nuisettes, tenues détente — experts en matières douces et finitions soignées."
                  :"Pyjamas, nightgowns, leisure wear — experts in soft materials and refined finishes.",
          img:'./assets/actual-textiles/Actual-Textiles-4.jpeg' },
        { title:isFr?'Accessoires & Autres':'Accessories & More',
          desc:isFr?"Notre expertise s'étend à une large gamme d'autres vêtements et accessoires."
                  :"Our expertise extends to a wide range of garments and accessories.",
          img:'./assets/actual-textiles/tissus_hautes_qualites-min.jpg' },
      ];
      return (
        <section style={{ padding:sp(m), background:'var(--cream)' }}>
          <div style={{ maxWidth:1280, margin:'0 auto', padding:pad(m) }}>
            <Reveal>
              <Label>{isFr?'Ce que nous fabriquons':'What we make'}</Label>
              <h2 style={{ fontFamily:'Cormorant Garamond, serif', fontSize:m?32:48,
                fontWeight:400, lineHeight:1.08, marginBottom:m?32:56, letterSpacing:'-0.01em' }}>
                {isFr?<>Des produits<br /><em>d'exception</em></>:<>Products of<br /><em>distinction</em></>}
              </h2>
            </Reveal>
            <div style={{ display:'grid', gridTemplateColumns:m?'1fr 1fr':'repeat(4,1fr)', gap:m?8:2 }}>
              {products.map((p,i) => (
                <Reveal key={i} delay={i*.07}>
                  <div style={{ background:'var(--stone)', overflow:'hidden' }}>
                    <img src={p.img} alt={p.title} loading="lazy"
                      style={{ width:'100%', height:m?150:230, objectFit:'cover', transition:'transform .5s' }}
                      onMouseEnter={e=>e.target.style.transform='scale(1.05)'}
                      onMouseLeave={e=>e.target.style.transform='scale(1)'} />
                    <div style={{ padding:m?'14px 12px 18px':'22px 20px 26px' }}>
                      <h3 style={{ fontFamily:'Cormorant Garamond, serif', fontSize:m?17:21,
                        fontWeight:400, marginBottom:8 }}>{p.title}</h3>
                      {!m && <p style={{ fontSize:13, lineHeight:1.7, color:'var(--mid)' }}>{p.desc}</p>}
                    </div>
                  </div>
                </Reveal>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function ProcessSection() {
      const t = useT(); const p = t.production; const m = useMobile();
      const [active, setActive] = useState(0);
      const imgs = [
        './assets/actual-textiles/developpement_produits.jpg',
        './assets/actual-textiles/confection_vetements.jpg',
        './assets/actual-textiles/departement-de_coupe.jpg',
        './assets/actual-textiles/departement_couture.jpg',
        './assets/actual-textiles/controle_qualite-min.jpg',
        './assets/actual-textiles/departement_logistique.jpg',
      ];
      return (
        <section style={{ background:'var(--stone)', padding:sp(m) }}>
          <div style={{ maxWidth:1280, margin:'0 auto', padding:pad(m) }}>
            <Reveal>
              <Label>{p.label}</Label>
              <h2 style={{ fontFamily:'Cormorant Garamond, serif', fontSize:m?32:48,
                fontWeight:400, lineHeight:1.08, marginBottom:m?28:52, letterSpacing:'-0.01em' }}>
                {p.title1}<br /><em>{p.titleItalic}</em>
              </h2>
            </Reveal>
            {/* Step selector */}
            <div style={{ display:'grid', gridTemplateColumns:m?'repeat(3,1fr)':'repeat(6,1fr)', gap:2, marginBottom:m?24:48 }}>
              {p.steps.map((s,i) => (
                <button key={i} onClick={()=>setActive(i)} style={{
                  background:active===i?'var(--dark)':'white', border:'none', cursor:'pointer',
                  padding:m?'14px 10px':'18px 14px', textAlign:'left',
                  borderTop:`3px solid ${active===i?'var(--amber)':'transparent'}`, transition:'all .2s' }}>
                  <div style={{ fontFamily:'Cormorant Garamond, serif', fontSize:m?20:26, fontWeight:300,
                    color:active===i?'var(--amber)':'var(--mid)', marginBottom:6 }}>{s.num}</div>
                  <div style={{ fontSize:m?11:12, fontWeight:500, lineHeight:1.3,
                    color:active===i?'white':'var(--dark)' }}>{s.title}</div>
                </button>
              ))}
            </div>
            {/* Detail */}
            <div key={active} style={{ display:'grid', gridTemplateColumns:m?'1fr':'1fr 1fr',
              gap:m?24:64, alignItems:'center', animation:'fadeIn .35s ease' }}>
              <Reveal>
                <img src={imgs[active]} alt={p.steps[active].title} loading="lazy"
                  style={{ width:'100%', height:m?220:380, objectFit:'cover' }} />
              </Reveal>
              <Reveal delay={m?0:0.1}>
                <div style={{ fontSize:10, letterSpacing:'0.18em', textTransform:'uppercase',
                  color:'var(--amber)', marginBottom:10 }}>{p.stepLabel} {p.steps[active].num}</div>
                <h3 style={{ fontFamily:'Cormorant Garamond, serif', fontSize:m?26:36,
                  fontWeight:400, marginBottom:16 }}>{p.steps[active].title}</h3>
                <p style={{ fontSize:15, lineHeight:1.78, color:'var(--mid)', marginBottom:24 }}>{p.steps[active].desc}</p>
                <div style={{ display:'flex', gap:12 }}>
                  {active>0 && <button onClick={()=>setActive(a=>a-1)} style={{ background:'none',
                    border:'1px solid var(--border)', padding:'10px 18px', fontSize:11,
                    letterSpacing:'0.1em', textTransform:'uppercase', cursor:'pointer', color:'var(--mid)' }}>
                    ← {useLang()==='fr'?'Préc.':'Prev'}
                  </button>}
                  {active<5 && <button onClick={()=>setActive(a=>a+1)} style={{ background:'var(--dark)',
                    color:'white', border:'none', padding:'10px 18px', fontSize:11,
                    letterSpacing:'0.1em', textTransform:'uppercase', cursor:'pointer' }}>
                    {useLang()==='fr'?'Suiv.':'Next'} →
                  </button>}
                </div>
              </Reveal>
            </div>
          </div>
        </section>
      );
    }

    function TechSection() {
      const lang = useLang(); const m = useMobile(); const isFr = lang==='fr';
      return (
        <section id="technology" style={{ background:'var(--dark)', color:'white', padding:sp(m) }}>
          <div style={{ maxWidth:1280, margin:'0 auto', padding:pad(m),
            display:'grid', gridTemplateColumns:m?'1fr':'1fr 1fr', gap:m?36:96, alignItems:'center' }}>
            <Reveal>
              <img src="./assets/actual-textiles/Actual-Textiles-5.jpg" alt="Technology" loading="lazy"
                style={{ width:'100%', height:m?240:480, objectFit:'cover' }} />
            </Reveal>
            <Reveal delay={m?0:0.14}>
              <Label color="rgba(255,255,255,.4)">{isFr?'Technologie & innovation':'Technology & innovation'}</Label>
              <h2 style={{ fontFamily:'Cormorant Garamond, serif', fontSize:m?30:46,
                fontWeight:400, lineHeight:1.08, marginBottom:24, letterSpacing:'-0.01em' }}>
                {isFr?<>Précision<br /><em>à la pointe</em></>:<>Precision<br /><em>at the cutting edge</em></>}
              </h2>
              <p style={{ fontSize:15, lineHeight:1.78, opacity:.72, marginBottom:20 }}>
                {isFr?"Nous utilisons le système LECTRA — référence mondiale dans la création de patrons — pour générer des modèles d'une précision millimétrée."
                     :"We use the LECTRA system — the global benchmark in pattern making — to generate models with millimetre-precise accuracy."}
              </p>
              <p style={{ fontSize:15, lineHeight:1.78, opacity:.72, marginBottom:28 }}>
                {isFr?"Notre parc de machines couvre une large palette de techniques : chemiserie, matières tissées et tricotées, broderie — une grande flexibilité dans les styles produits."
                     :"Our machines cover a wide spectrum: shirt craftsmanship, woven and knit construction, embroidery — exceptional flexibility across garment styles."}
              </p>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
                {(isFr?['Système LECTRA CAD','Qualité AQL 1.0','Matières mixtes','100% inspection']
                       :['LECTRA CAD system','AQL 1.0 quality','Mixed materials','100% inspection']
                ).map((item,i) => (
                  <div key={i} style={{ display:'flex', gap:10, alignItems:'center' }}>
                    <span style={{ color:'var(--amber)', fontSize:16 }}>◈</span>
                    <span style={{ fontSize:13.5, opacity:.75 }}>{item}</span>
                  </div>
                ))}
              </div>
            </Reveal>
          </div>
        </section>
      );
    }

    function QCSection() {
      const lang = useLang(); const m = useMobile(); const isFr = lang==='fr';
      return (
        <section id="qc" style={{ background:'var(--cream)', padding:sp(m) }}>
          <div style={{ maxWidth:1280, margin:'0 auto', padding:pad(m),
            display:'grid', gridTemplateColumns:m?'1fr':'1fr 1fr', gap:m?36:96, alignItems:'center' }}>
            <Reveal>
              <Label>{isFr?'Contrôle qualité':'Quality control'}</Label>
              <h2 style={{ fontFamily:'Cormorant Garamond, serif', fontSize:m?30:46,
                fontWeight:400, lineHeight:1.08, marginBottom:24, letterSpacing:'-0.01em' }}>
                {isFr?<>AQL 1.0<br /><em>sans compromis</em></>:<>AQL 1.0<br /><em>no compromise</em></>}
              </h2>
              <p style={{ fontSize:15, lineHeight:1.78, color:'var(--mid)', marginBottom:20 }}>
                {isFr?"Notre système de contrôle en cours de production est conçu pour livrer des vêtements répondant exactement aux spécifications du client. Chaque lot fait l'objet d'une inspection à 100% avant expédition."
                     :"Our in-process quality control system is designed to deliver garments meeting exact client specifications. Every lot undergoes 100% comprehensive inspection before shipment."}
              </p>
              <p style={{ fontSize:15, lineHeight:1.78, color:'var(--mid)', marginBottom:28 }}>
                {isFr?"Nos équipes s'adaptent à tout standard AQL demandé, maintenant notre niveau de conformité AQL 1.0. Inspection internationale indépendante disponible sur demande."
                     :"Our teams adapt to any AQL standard requested, maintaining our recognised AQL 1.0 compliance. Independent international inspection can be engaged on request."}
              </p>
              <a href="./contact.html" style={{ display:'inline-block', background:'var(--forest)',
                color:'white', padding:'13px 28px', fontSize:12, fontWeight:500,
                letterSpacing:'0.1em', textTransform:'uppercase' }}>
                {isFr?'Demander un devis':'Request a quote'}
              </a>
            </Reveal>
            <Reveal delay={m?0:0.14}>
              <img src="./assets/actual-textiles/controle_qualite-min.jpg"
                alt="Quality Control" loading="lazy"
                style={{ width:'100%', height:m?240:500, objectFit:'cover' }} />
            </Reveal>
          </div>
        </section>
      );
    }

    function App() {
      const [lang, setLang]         = useState(() => localStorage.getItem('at-lang') || 'en');
      const [scrolled, setScrolled] = useState(false);
      const isMobile                = useIsMobile();
      const isFr = lang === 'fr';
      const handleSetLang = (l) => { localStorage.setItem('at-lang', l); setLang(l); };
      useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 56);
        window.addEventListener('scroll', fn, { passive:true });
        return () => window.removeEventListener('scroll', fn);
      }, []);
      return (
        <LangCtx.Provider value={lang}>
          <MobileCtx.Provider value={isMobile}>
            <SharedNav lang={lang} setLang={handleSetLang} scrolled={scrolled} activePage="production" />
            <PageHero label="Production"
              title={isFr?'Excellence':'Excellence'}
              titleItalic={isFr?'à chaque étape':'at every step'}
              imgSrc="./assets/actual-textiles/La-production-de-Actual-textiles.jpg"
              breadcrumb={isFr?'Accueil → Production':'Home → Production'} />
            <ProductsSection />
            <ProcessSection />
            <TechSection />
            <QCSection />
            <section style={{ background:'var(--amber)', color:'white',
              padding:isMobile?'56px 20px':'72px 48px', textAlign:'center' }}>
              <Reveal>
                <h2 style={{ fontFamily:'Cormorant Garamond, serif', fontSize:isMobile?30:42, fontWeight:400, marginBottom:18 }}>
                  {isFr?<>Prêts à démarrer <em>votre production ?</em></>:<>Ready to start <em>your production?</em></>}
                </h2>
                <a href="./contact.html" style={{ display:'inline-block', background:'white', color:'var(--amber)',
                  padding:'13px 36px', fontSize:12, fontWeight:600, letterSpacing:'0.12em',
                  textTransform:'uppercase', marginTop:8 }}>
                  {isFr?'Nous contacter':'Get in touch'}
                </a>
              </Reveal>
            </section>
            <SharedFooter />
          </MobileCtx.Provider>
        </LangCtx.Provider>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
