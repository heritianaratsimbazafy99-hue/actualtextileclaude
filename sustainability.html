<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sustainability — Actual Textiles Madagascar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--cream:oklch(97% .009 80);--dark:oklch(16% .018 55);--forest:oklch(36% .105 155);--amber:oklch(59% .125 62);--stone:oklch(93% .007 75);--mid:oklch(50% .010 70);--border:oklch(88% .008 75)}
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);overflow-x:hidden;-webkit-font-smoothing:antialiased}
    img{max-width:100%;display:block} a{text-decoration:none;color:inherit} button{font-family:inherit}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="at-i18n.jsx"></script>
  <script type="text/babel" src="at-shared.jsx"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const sp = (m) => `${m?'64px':'110px'} 0`;
    const pad = (m) => `0 ${m?'20px':'48px'}`;

    function EnvironmentSection() {
      const lang = useLang(); const m = useMobile(); const isFr = lang==='fr';
      const items = isFr
        ?['100% énergie solaire — zéro émission carbone','Recyclage et upcycling des déchets de production','Espaces verts et potagers collaboratifs sur site','Programmes de reforestation actifs à Madagascar','Réduction continue de l\'empreinte environnementale']
        :['100% solar energy — zero operational carbon emissions','Recycling & upcycling of all production waste','Green spaces and collaborative vegetable gardens on-site','Active reforestation programmes across Madagascar','Continuous reduction of environmental footprint'];
      return (
        <section id="environment" style={{ background:'var(--cream)', padding:sp(m) }}>
          <div style={{ maxWidth:1280, margin:'0 auto', padding:pad(m),
            display:'grid', gridTemplateColumns:m?'1fr':'1fr 1fr', gap:m?40:96, alignItems:'center' }}>
            <Reveal>
              <div style={{ position:'relative' }}>
                <img src="https://www.actualtextiles.com/wp-content/uploads/2021/11/Environnement-5.jpg"
                  alt="Environment" style={{ width:'100%', height:m?260:540, objectFit:'cover' }} />
                <div style={{ position:'absolute', top:m?16:24, left:m?16:24,
                  background:'var(--forest)', color:'white', padding:m?'12px 16px':'16px 22px' }}>
                  <div style={{ fontFamily:'Cormorant Garamond, serif', fontSize:m?24:32, fontWeight:300, lineHeight:1 }}>100%</div>
                  <div style={{ fontSize:9.5, letterSpacing:'0.16em', textTransform:'uppercase', opacity:.75, marginTop:4 }}>
                    {isFr?'Énergie solaire':'Solar Energy'}
                  </div>
                </div>
              </div>
            </Reveal>
            <Reveal delay={m?0:0.14}>
              <Label>{isFr?'Environnement':'Environment'}</Label>
              <h2 style={{ fontFamily:'Cormorant Garamond, serif', fontSize:m?30:46,
                fontWeight:400, lineHeight:1.08, marginBottom:24, letterSpacing:'-0.01em' }}>
                {isFr?<>Production<br /><em>100% solaire</em></>:<>Powered entirely<br /><em>by the sun</em></>}
              </h2>
              <p style={{ fontSize:15, lineHeight:1.78, color:'var(--mid)', marginBottom:20 }}>
                {isFr?"Notre usine fonctionne intégralement à l'énergie solaire, faisant d'Actual Textiles l'un des rares fabricants textiles à pouvoir revendiquer une production sans émissions carbone opérationnelles."
                     :"Our factory runs entirely on solar power, making Actual Textiles one of the very few garment manufacturers able to claim zero operational carbon emissions."}
              </p>
              <p style={{ fontSize:15, lineHeight:1.78, color:'var(--mid)', marginBottom:28 }}>
                {isFr?"Nous collaborons avec des organisations locales pour recycler nos chutes de tissu, entretenons des jardins communautaires et participons à des programmes de reforestation."
                     :"We collaborate with local organisations to recycle fabric offcuts, maintain communal gardens, and participate in reforestation programmes that protect Madagascar's unique biodiversity."}
              </p>
              <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
                {items.map((c,i) => (
                  <div key={i} style={{ display:'flex', gap:12, alignItems:'flex-start' }}>
                    <span style={{ color:'var(--forest)', fontSize:15, lineHeight:1.3, flexShrink:0 }}>◈</span>
                    <span style={{ fontSize:14, lineHeight:1.65 }}>{c}</span>
                  </div>
                ))}
              </div>
            </Reveal>
          </div>
        </section>
      );
    }

    function HealthSection() {
      const lang = useLang(); const m = useMobile(); const isFr = lang==='fr';
      const measures = [
        { title:isFr?'Équipe médicale sur site':'On-site medical team', num:'01',
          desc:isFr?"Consultations gratuites, soins dentaires, contrôles de la vue et médicaments pour tous les employés."
                  :"Free consultations, dental care, vision check-ups and medications for all employees at any time.",
          img:'https://www.actualtextiles.com/wp-content/uploads/2021/11/Assistance-medical.jpg' },
        { title:isFr?'Premiers secours':'First aid in every dept.', num:'02',
          desc:isFr?"Des secouristes formés sont présents dans chaque département, avec une formation annuelle."
                  :"Trained first-aid personnel present in every department, with annual training by our medical team.",
          img:'https://www.actualtextiles.com/wp-content/uploads/2022/07/Vaccination-Textile-Madagascar.jpg' },
        { title:isFr?'Hygiène & propreté':'Hygiene & cleanliness', num:'03',
          desc:isFr?"Nettoyage quotidien, désinfection régulière et interventions mensuelles anti-nuisibles."
                  :"Daily cleaning, regular sanitisation, and monthly professional pest control ensure a healthy environment.",
          img:'https://www.actualtextiles.com/wp-content/uploads/2021/11/Eau-potable.jpg' },
        { title:isFr?'Ateliers santé':'Health workshops', num:'04',
          desc:isFr?"Ateliers sur la nutrition, la prévention des maladies, les soins dentaires et l'eau potable."
                  :"Workshops on nutrition, disease prevention, dental care and the importance of clean drinking water.",
          img:'https://www.actualtextiles.com/wp-content/uploads/2021/11/Sociale-chez-Actual-textiles.jpg' },
      ];
      return (
        <section id="health" style={{ background:'var(--stone)', padding:sp(m) }}>
          <div style={{ maxWidth:1280, margin:'0 auto', padding:pad(m) }}>
            <Reveal>
              <Label>{isFr?'Santé & sécurité':'Health & Safety'}</Label>
              <h2 style={{ fontFamily:'Cormorant Garamond, serif', fontSize:m?30:46,
                fontWeight:400, lineHeight:1.08, marginBottom:m?32:52, letterSpacing:'-0.01em' }}>
                {isFr?<>Le bien-être<br /><em>avant tout</em></>:<>Well-being<br /><em>above all</em></>}
              </h2>
            </Reveal>
            <div style={{ display:'grid', gridTemplateColumns:m?'1fr 1fr':'repeat(4,1fr)', gap:m?8:2 }}>
              {measures.map((mx,i) => (
                <Reveal key={i} delay={i*.07}>
                  <div style={{ background:'white', overflow:'hidden' }}>
                    <img src={mx.img} alt={mx.title} loading="lazy"
                      style={{ width:'100%', height:m?140:190, objectFit:'cover', objectPosition:'center 20%' }} />
                    <div style={{ padding:m?'14px 12px 18px':'20px 18px 24px' }}>
                      <div style={{ fontSize:10, letterSpacing:'0.16em', textTransform:'uppercase',
                        color:'var(--forest)', marginBottom:6 }}>{mx.num}</div>
                      <h3 style={{ fontFamily:'Cormorant Garamond, serif', fontSize:m?16:19,
                        fontWeight:400, marginBottom:8, lineHeight:1.2 }}>{mx.title}</h3>
                      {!m && <p style={{ fontSize:13, lineHeight:1.68, color:'var(--mid)' }}>{mx.desc}</p>}
                    </div>
                  </div>
                </Reveal>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function SocialSection() {
      const lang = useLang(); const m = useMobile(); const isFr = lang==='fr';
      const items = isFr
        ?['Commerce équitable & pratiques responsables','Soutien aux femmes entrepreneures malgaches','Programmes de sensibilisation à la biodiversité','Journées mondiales du travail — santé et bien-être','Partenariats avec les communautés locales']
        :['Fair trade & responsible business practices','Support for Malagasy women entrepreneurs','Biodiversity awareness campaigns','World Day for Safety & Health at Work events','Partnerships with local communities'];
      return (
        <section id="social" style={{ background:'var(--forest)', color:'white', padding:sp(m) }}>
          <div style={{ maxWidth:1280, margin:'0 auto', padding:pad(m),
            display:'grid', gridTemplateColumns:m?'1fr':'1fr 1fr', gap:m?40:96, alignItems:'center' }}>
            <Reveal>
              <Label color="rgba(255,255,255,.45)">{isFr?'Impact social':'Social impact'}</Label>
              <h2 style={{ fontFamily:'Cormorant Garamond, serif', fontSize:m?30:46,
                fontWeight:400, lineHeight:1.08, marginBottom:24, letterSpacing:'-0.01em' }}>
                {isFr?<>Investir<br /><em>dans les gens</em></>:<>Investing<br /><em>in people</em></>}
              </h2>
              <p style={{ fontSize:15, lineHeight:1.78, opacity:.75, marginBottom:20 }}>
                {isFr?"Nous croyons que la responsabilité sociale est une obligation envers notre communauté, nos employés et l'avenir de Madagascar. Nous défendons le commerce équitable et investissons activement dans le développement local."
                     :"We believe social responsibility is an obligation towards our community, our employees, and the future of Madagascar. We champion fair trade and actively invest in local development."}
              </p>
              <p style={{ fontSize:15, lineHeight:1.78, opacity:.75, marginBottom:28 }}>
                {isFr?"Du soutien aux femmes entrepreneures lors du Forum mondial à Antananarivo aux campagnes de sensibilisation — notre engagement envers la société malgache est profond et durable."
                     :"From supporting women entrepreneurs at the World Forum in Antananarivo to biodiversity campaigns — our commitment to Malagasy society is deep and lasting."}
              </p>
              <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                {items.map((item,i) => (
                  <div key={i} style={{ display:'flex', gap:12, alignItems:'flex-start' }}>
                    <span style={{ color:'var(--amber)', fontSize:15, flexShrink:0 }}>◈</span>
                    <span style={{ fontSize:14, opacity:.8 }}>{item}</span>
                  </div>
                ))}
              </div>
            </Reveal>
            <Reveal delay={m?0:0.14}>
              <img src="https://www.actualtextiles.com/wp-content/uploads/2021/12/projet_sociaux.jpg"
                alt="Social projects" loading="lazy"
                style={{ width:'100%', height:m?260:540, objectFit:'cover' }} />
            </Reveal>
          </div>
        </section>
      );
    }

    const CERT_DETAILS = [
      { name:'GOTS', img:'https://www.actualtextiles.com/wp-content/uploads/2024/10/LOGO-GOTS-A-JOUR-1024x1015.png',
        en:"World's leading standard for sustainable textile chain — at least 70% organic fibers and high ecological & social criteria.",
        fr:"Norme de référence mondiale pour une chaîne durable — au moins 70% de fibres biologiques et critères sociaux élevés." },
      { name:'OCS — Ecocert', img:'https://www.actualtextiles.com/wp-content/uploads/2024/10/Organic-100.png',
        en:"Ensures at least 95% organic material content throughout the supply chain, certified by Ecocert.",
        fr:"Garantit au moins 95% de matières organiques tout au long de la chaîne, certifié par Ecocert." },
      { name:'WRAP', img:'https://www.actualtextiles.com/wp-content/uploads/2024/10/wrap_logo.jpg',
        en:"Certifying ethical, humane, lawful and safe manufacturing in compliance with local laws and regulations.",
        fr:"Certifie une fabrication éthique, humaine, légale et sûre en conformité avec les lois locales." },
      { name:'amfori BSCI', img:'https://www.actualtextiles.com/wp-content/uploads/2024/10/Business-Social-Compliance.png',
        en:"Ensuring labour rights, fair wages, safe conditions and ethical treatment throughout our operations.",
        fr:"Garantit les droits des travailleurs, des salaires équitables, des conditions sûres et un traitement éthique." },
      { name:'SMETA / Sedex', img:'https://www.actualtextiles.com/wp-content/uploads/2024/10/SMETA.png',
        en:"Most widely used ethical trade audit — covering labour, health & safety, environment and business ethics.",
        fr:"Méthode d'audit la plus utilisée — couvrant le travail, la santé, l'environnement et l'éthique." },
      { name:'GSV — Intertek', img:'https://www.actualtextiles.com/wp-content/uploads/2024/10/Global-security-verification.png',
        en:"Confirming that our facilities meet rigorous international standards for physical and procedural security.",
        fr:"Confirme que nos installations répondent aux standards rigoureux de sécurité physique et procédurale." },
    ];
    const CERT_LOGOS = [
      { name:'ICS', img:'https://www.actualtextiles.com/wp-content/uploads/2024/10/ICS.png' },
      { name:'AGOA', img:'https://www.actualtextiles.com/wp-content/uploads/2024/10/agoa_logo.jpg' },
      { name:'Authorized Disney', img:'https://www.actualtextiles.com/wp-content/uploads/2024/10/Authorized-Disney.png' },
      { name:'Lectra', img:'https://www.actualtextiles.com/wp-content/uploads/2024/10/Lectra.png' },
    ];

    function CertificationsSection() {
      const lang = useLang(); const m = useMobile(); const isFr = lang==='fr';
      return (
        <section id="certifications" style={{ background:'var(--cream)', padding:sp(m) }}>
          <div style={{ maxWidth:1280, margin:'0 auto', padding:pad(m) }}>
            <Reveal>
              <Label>{isFr?'Nos certifications':'Our certifications'}</Label>
              <h2 style={{ fontFamily:'Cormorant Garamond, serif', fontSize:m?30:46,
                fontWeight:400, lineHeight:1.08, marginBottom:m?16:20, letterSpacing:'-0.01em' }}>
                {isFr?<>Qualité<br /><em>certifiée & vérifiée</em></>:<>Certified<br /><em>&amp; verified quality</em></>}
              </h2>
              <p style={{ fontSize:15, lineHeight:1.78, color:'var(--mid)', marginBottom:m?32:52, maxWidth:540 }}>
                {isFr?"Nos certifications sont renouvelées annuellement avec des scores parmi les meilleurs de la région, couvrant toute la chaîne de production."
                     :"Our certifications are renewed annually with consistently top-tier regional scores, covering the entire production chain."}
              </p>
            </Reveal>
            <div style={{ display:'grid', gridTemplateColumns:m?'1fr':'1fr 1fr', gap:2, marginBottom:2 }}>
              {CERT_DETAILS.map((c,i) => (
                <Reveal key={i} delay={i*.06}>
                  <div style={{ background:'var(--stone)', padding:m?'20px 16px':32,
                    display:'flex', gap:m?16:24, alignItems:'flex-start' }}>
                    <img src={c.img} alt={c.name} loading="lazy"
                      style={{ height:m?40:52, width:'auto', maxWidth:m?64:80, objectFit:'contain', flexShrink:0 }}
                      onError={e=>{e.target.style.display='none';}} />
                    <div>
                      <div style={{ fontSize:12, fontWeight:600, letterSpacing:'0.04em', marginBottom:8 }}>{c.name}</div>
                      <p style={{ fontSize:m?12.5:13.5, lineHeight:1.7, color:'var(--mid)' }}>{isFr?c.fr:c.en}</p>
                    </div>
                  </div>
                </Reveal>
              ))}
            </div>
            <div style={{ display:'grid', gridTemplateColumns:m?'1fr 1fr':'repeat(4,1fr)', gap:2 }}>
              {CERT_LOGOS.map((c,i) => (
                <Reveal key={i} delay={i*.05}>
                  <div style={{ background:'white', padding:m?'20px 16px':'26px 20px',
                    display:'flex', flexDirection:'column', alignItems:'center', gap:10, minHeight:m?90:108 }}>
                    <img src={c.img} alt={c.name} loading="lazy"
                      style={{ height:m?36:44, width:'auto', maxWidth:m?70:80, objectFit:'contain' }}
                      onError={e=>{e.target.style.display='none';}} />
                    <span style={{ fontSize:9.5, letterSpacing:'0.13em', textTransform:'uppercase',
                      color:'var(--mid)', textAlign:'center' }}>{c.name}</span>
                  </div>
                </Reveal>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function App() {
      const [lang, setLang]         = useState(() => localStorage.getItem('at-lang') || 'en');
      const [scrolled, setScrolled] = useState(false);
      const isMobile                = useIsMobile();
      const isFr = lang === 'fr';
      const handleSetLang = (l) => { localStorage.setItem('at-lang', l); setLang(l); };
      useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 56);
        window.addEventListener('scroll', fn, { passive:true });
        return () => window.removeEventListener('scroll', fn);
      }, []);
      return (
        <LangCtx.Provider value={lang}>
          <MobileCtx.Provider value={isMobile}>
            <SharedNav lang={lang} setLang={handleSetLang} scrolled={scrolled} activePage="sustainability" />
            <PageHero label={isFr?'Durabilité':'Sustainability'}
              title={isFr?'Responsable':'Responsible'}
              titleItalic={isFr?'par nature':'by design'}
              imgSrc="https://www.actualtextiles.com/wp-content/uploads/2021/11/Environnement-5.jpg"
              breadcrumb={isFr?'Accueil → Durabilité':'Home → Sustainability'} />
            <EnvironmentSection />
            <HealthSection />
            <SocialSection />
            <CertificationsSection />
            <section style={{ background:'var(--forest)', color:'white',
              padding:isMobile?'56px 20px':'72px 48px', textAlign:'center' }}>
              <Reveal>
                <h2 style={{ fontFamily:'Cormorant Garamond, serif', fontSize:isMobile?28:38, fontWeight:400, marginBottom:14, lineHeight:1.2 }}>
                  {isFr?<>Documentation complète<br /><em>disponible sur demande</em></>:<>Full certification docs<br /><em>available on request</em></>}
                </h2>
                <a href="./contact.html" style={{ display:'inline-block',
                  border:'1px solid rgba(255,255,255,.42)', color:'white',
                  padding:'12px 32px', fontSize:12, fontWeight:500,
                  letterSpacing:'0.12em', textTransform:'uppercase', marginTop:12 }}>
                  {isFr?'Nous contacter':'Contact us'}
                </a>
              </Reveal>
            </section>
            <SharedFooter />
          </MobileCtx.Provider>
        </LangCtx.Provider>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
